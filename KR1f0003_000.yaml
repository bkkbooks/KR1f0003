  text: 欽定四庫全書經部六
  hash: sha256:2692c0527bba75b86f9dbf49a178b8ed79858ae8739598c55d6f9985469b2b6a
  markers:
  - {type: page-break, offset: 0, content: '', id: KR1f0003_WYG_000-1a, image: WYG0182/WYG0182-0001a.png}
body:
  text: 古文孝經孔氏傳孝經類提要臣等謹案古文孝經孔氏傳一卷舊本題漢孔安國傳日本信陽太宰純音據卷末乾隆丙申歙縣鮑廷博新刋跋稱其友汪翼滄附市舶至日本得于彼國之長﨑澳核其紀嵗干支乃康熙十一年所刋前有太宰純序稱古書亡于中夏存于日本者頗多昔僧奝然適宋獻鄭注孝經一本今去其世七百餘年古書之散逸者亦不少而孔傳古文孝經全然尚存惟是經國人相傳之久不知歷幾人書寫是以文字訛謬魚魯不辨純既以數本校讐且旁及他書所引苟有足徴者莫不參考十更裘葛乃成定本其經文與宋人所謂古文者亦不全同今不敢從彼改此傳中間有不成語雖疑其有誤然諸本皆同無所取正故姑傳疑以俟君子今文唐陸元朗嘗音之古文則否今因依陸氏音例並音經傳庶乎令讀者不誤其音云云考世傳海外之本别有所謂七經孟子考文者亦日本人所刋稱西條掌書記山井鼎輯東都講官物觀補遺中有古文孝經一卷亦云古文孔傳中華所不傳而其邦獨存又云其真偽不可辨末學微賤不敢輒議云云則日本相傳原有是書非鮑氏新刋贋造此本核其文句與山井鼎等所考大抵相應惟山井鼎等稱每章題下有劉炫直解其字極細寫之與注文粗細弗類又有引及邢昺正義者為後人附録此本無之為少異耳其傳文雖證以論衡經典釋文唐會要所引亦頗相合然淺陋冗漫不類漢儒釋經之體併不類唐宋元以前人語殆市舶流通頗得中國書籍有桀黠知文義者托諸書所引孔傳影附為之以自誇圖籍之富歟考元王惲中堂事紀有曰中統二年高麗世子植來朝宴于中書省問曰傳聞汝邦有古文尚書及海外異書答曰與中國書不殊髙麗日本比鄰相接海東經典大概可知使果有之何以奝然不與鄭注並獻至今日而乃出足徴彼國之本出自宋元以後觀山井鼎亦疑之則其事固可知矣特以海外祕文人所樂覩使不實見其書終不知所謂古文孝經孔傳不過如此轉為好古者之所惜故特録存之具列其始末如右乾隆四十六年九月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀古文孝經孔氏傳原序先王之道莫大於孝仲尼之教莫先於孝自六經而下無非孔氏遺書其有出孝經之右者乎何以言之天下無有無父母之人故也孝經有二本其一河間王所得十八章者謂之今文其一魯共王壞孔壁所得竹牒科斗文二十二章者孔安國所為作傳謂之古文安國曰今文十八章文字多誤又曰河間王所上雖多誤然以先出之故諸國往往有之漢先帝發詔稱其辭者皆言傳曰其實今文孝經也由是觀之今文孝經之行也已久矣古文者雖安國為之訓傳蓋當時未之行也逮乎漢季馬季長擬作忠經十八章效今文孝經也鄭康成注孝經亦其今文者也自是厥後今文孝經之行彌盛而古文亦與之俱行至唐明皇親注孝經雖兼取孔鄭二家之説然其經則用今文取其闕閨門章也於是古文孝經遂廢不行至宋邢昺依明皇御注作正義然後孝經唯御注本行于世鄭注遂亡古文孝經亦亡其傳文而僅存其經文宋人尊信孝經者莫若司馬溫公然特得古文本經而讀之耳不覩孔傳也自二程至朱熹氏皆疑孝經以為後人所擬作朱子又妄改易本經篇章著為經一章傳十四章且刪去其本文二百餘字孔子曰信而好古若朱子者可謂拂矣自是以來學朱氏者舉不信孝經孰師不以為教至令童子輩目弗見孝經悲夫先王之道莫大於孝仲尼之教莫先於孝夫子不曰乎吾志在春秋行在孝經是以後世人主不讀書則已苟讀書者必自孝經始況下焉者乎今朱氏之徒不讀孝經而學心法其不為浮屠之歸者幾希夫古書之亡于中夏而存于我日本者頗多宋歐陽子嘗作詩稱逸書百篇今尚存昔僧奝然適宋獻鄭注孝經一本於太宗司馬君實等得之大喜云今去其世七百有餘年古書之散逸者亦不少而孔傳古文孝經全然尚存于我日本豈不異哉豫嘗試檢其書古人所引孔安國孝經傳者及明皇御注之文邢昺以為依孔傳者畢有特有一二字不同耳得非傳寫之互訛乎先儒多疑孔傳以為後人偽造者豫獨以為非經曰身體髮膚受之父母弗敢毁傷孝之始也諸家解皆以為孝子不得以凡人事及過失毁傷其身體孔傳乃以為刑傷蓋三代之刑有劓刵及宫非傷身乎剕非傷體乎髠非傷髮乎墨非傷膚乎以此觀之孔傳尤有所當也王仲任亦嘗誦是經文而曰孝者怕入刑辟刻畫身體毁傷髮膚少德泊行不戒慎之所致也合而觀之可以見古訓焉如從諸家説則忠臣赴君難者不避水火兵刃節婦有斷髮截鼻者彼皆為不孝矣是説不通也余故曰孔傳者安國所作無疑也或曰尚書之文竒古難讀安國傳之其言甚簡孝經之文平易安國傳之乃不厭繁文何也曰傳尚書者為學士大夫也故不盡其説使讀者思而得之傳孝經者為凡人也故丁寧其言以告諭之此其所以不同也嗚呼夫孝者百行之本萬善之先自天子至庶人所不可以一日廢也夫孝不可以一日廢則孝經亦不可以一日廢也夫自朱氏之學行而孝經久廢于世純常慨焉幸孔壁古文孝經并與安國之傳存于我日本者寧不知珍而寶之哉惟是經國人相傳之久不知厯幾人書寫是以文字訛謬魚魯不辨純既以數本校讐且旁及他書所引若釋氏所稱述苟有足徵者莫不參考十更裘葛乃成定本其經文與宋人所謂古文者亦不全同今不敢從彼改此蓋相承之異未必宋本之是而我本之非也傳中間有不成語雖疑其有誤然諸本皆同無所取正故姑傳疑以俟君子今文唐陸元朗嘗音之古文則否今因依陸氏音例並音經傳庶乎令讀者不誤其音矣書成而欲刻之家孰則淺田思孝出其槖裝以助費遂趣命工從事豫未能為吾家孝子且為孔氏忠臣云爾太宰純謹序古文孝經孔氏傳孔安國孝經者何也孝者人之高行經常也自有天地人民以來而孝道著矣上有明王則大化滂流充塞六合若其無也則斯道滅息行下孟反滂普光反塞先北反當吾先君孔子之世周失其柄諸侯力爭道德既隱禮誼又廢至乃臣弒其君子弒其父亂逆無紀莫之能正是以夫子每於間居而歎述古之孝道也弒施志反下同間音間夫子敷先王之教於魯之洙泗門徒三千而達者七十有二也貫首弟子顔回閔子騫冉伯牛仲弓性也至孝之自然皆不待諭而寤者也其餘則悱悱憤憤若存若亡敷芳無反洙音殊泗音四有音又下有二同騫起虔反悱芳匪反憤房粉反唯曽參躬行匹夫之孝而未達天子諸侯以下揚名顯親之事因侍坐而咨問焉故夫子告其誼於是曽子喟然知孝之為大也遂集而録之名曰孝經與五經並行於世參所金反坐才卧反喟苦位反逮乎六國學校衰廢及秦始皇焚書坑儒孝經由是絶而不傳也逮大計反又音代下同校户孝反焚扶云反坑苦庚反至漢興建元之初河間王得而獻之凡十八章文字多誤博士頗以教授後魯共王使人壞夫子講堂於壁中石函得古文孝經二十二章載在竹牒其長尺有二寸字科斗形共音恭壞音怪牒徒協反長直亮反魯三老孔子惠抱詣京師獻之天子天子使金馬門待詔學士與博士羣儒從隸字寫之還子惠一通以一通賜所幸侍中霍光光甚好之言為口實好呼報反下同時王公貴人咸神祕焉比於禁方天下競欲求學莫能得者每使者至魯輒以人事請索或好事者募以錢帛用相問遺魯吏有至帝都者無不齎持以為行路之資故古文孝經初出於孔氏使色吏反索所白反遺唯季反而今文十八章諸儒各任意巧説分為數家之誼淺學者以當六經其大車載不勝反云孔氏無古文孝經欲矇時人度其為説誣亦甚矣數色主及勝音升矇音蒙度待洛反吾愍其如此發憤精思為之訓傳悉載本文萬有餘言朱以發經墨以起傳庶後學者覩正誼之有在也思息嗣反傳直戀反下皆同今中祕書皆以魯三老所獻古文為正河間王所上雖多誤然以先出之故諸國往往有之漢先帝發詔稱其辭者皆言傳曰其實今文孝經也上時掌反昔吾逮從伏生論古文尚書誼時學士會云出叔孫氏之門自道知孝經有師法其説移風易俗莫善於樂謂為天子用樂省萬邦之風以知其盛衰衰則移之以貞盛之教淫則移之以貞固之風皆以樂聲知之知則移之故云移風易俗莫善於樂也省息井反又師曠云吾驟歌南風多死聲楚必無功即其類也且曰庶民之愚安能識音而可以樂移之乎驟仕救反當時衆人僉以為善吾嫌其説迂然無以難之後推尋其意殊不得爾也難乃旦反子遊為武城宰作絃歌以化民武城之下邑而猶化之以樂故傳曰夫樂以關山川之風以曜德於廣逺風德以廣之風物以聽之修詩以詠之修禮以節之又曰用之邦國焉用之鄉人焉此非唯天子用樂明矣夫音扶下同風德福鳯反下風物同夫雲集而龍興虎嘯而風起物之相感有自然者不可謂母也胡笳吟動馬蹀而悲黃老之彈嬰兒起舞庶民之愚愈於胡馬與嬰兒也何為不可以樂化之母音無牒徒協反經又云敬其父則子説敬其君則臣説而説者以為各自敬其為君父之道臣子乃説也余謂不然君雖不君臣不可以不臣父雖不父子不可以不子若君父不敬其為君父之道則臣子便可以忿之邪此説不通矣吾為傳皆弗之從焉也子説臣説乃説並音悅忿芳吻反邪音耶
