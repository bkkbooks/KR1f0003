body:
  text: 古文孝經孔氏傳開宗明誼章第一經一百二十五字仲尼間居曽子侍坐仲尼者孔子字也凡名有五品有信有誼有象有假有類以名生為信以德名為誼以類名為象取物為假取父為類仲尼首上汚似尼丘山故名曰丘而孛仲尼孔子者男子之通稱也仲尼之兄伯尼間居者靜而思道也曽子者男子之通稱也名參其父曽點亦孔子弟子也侍坐承事左右問道訓也反間音間坐才卧反汚烏華參所金反子曰參先王有至德要道以訓天下子孔子也師一而已故不稱姓先王先聖王也至德孝德也孝生於敬敬者寡而説者衆故謂之要道也訓教也道者扶持萬物使各終其性命者也施於人則變化其行而之正理故道在身則言自順而行自正事君自忠事父自孝與人自信應物自治一人用之不聞有餘天下行之不聞不足小取焉小得福大取焉大得福天下行之而天下服是以總而言之一謂之要道别而名之則謂之孝弟仁誼禮忠信也參所金反下同説音悅行下孟反下而行同治直吏反别彼列反弟大計反民用和睦上下亡怨女知之乎言先王行要道奉理則逺者和附近者睦親也所謂率己以化人也廢此二誼則萬姓不協父子相怨其數然也問曽子女寧知先王之以孝道化民之若此也亡音無女音汝下同曽子辟席曰參不敏何足以知之乎敏疾也曾子下席而跪稱名答曰參性遲鈍見誼不疾何足辱以知先王要道乎蓋謙辭也凡弟子請業及師之問皆作而離席也辟音避離力智反子曰夫孝德之本也教之所繇生也孝道者乃立德之本基也教化所從生也德者得也天地之道得則日月星辰不失其敘寒燠雷雨不失其節人主之化得則羣臣同其誼百官守其職萬姓説其惠來世歌其治父母之恩得則子孫和順長幼相承親戚歡娛姻族敦睦道之美莫精於德也悅夫音扶繇音由燠於六反説音治直吏反長丁丈反娛音虞復坐吾語女將開大道欲其審聽故令還復本坐而後語之夫辟席答對弟子執恭告令復坐師之恩恕也坐才卧反傳同語魚據反傳同令力呈反下同夫音扶辟音避身體髮膚受之父母不敢毁傷孝之始也本其所由也人生稟父母之血氣情性相通分形異體能自保全而無刑傷則其所以為孝之始者也是以君子之道謙約自持居上不驕處下不亂推敵能讓在衆不爭故逺於咎悔而無凶禍之災焉也處昌吕反推吐雷反逺于萬反立身行道揚名於後世以顯父母孝之終也立身者立身於孝也束修進德志邁清風遊于六藝之場蹈于無過之地乾乾日競夙夜匪解行其孝道聲譽宣聞父母尊顯於當時子孫光榮於無窮此則孝之終竟也解佳賣反聞如字又音問夫孝始於事親中於事君終於立身言孝行之非一也以事親言之其為孝也非徒不毁傷父母之遺體而已故略於上而詳於此互相備矣禮男初生則使人執桑弧蓬矢射天地四方示其有事是故自生至于三十則以事父母接兄弟和親戚睦宗族敬長老信朋友為始也四十以往所謂中也仕服官政行其典誼奉法無二事君之道也七十老致仕縣其所仕之車置諸廟永使子孫鑒而則焉立身之終其要然也反夫音扶行下孟反射食亦長丁丈反縣音玄大雅云亡念爾祖聿修其德大雅者美文王之德也無念念也聿𫐠也言當念其先祖而述修其德也斷章取誼上下相成所以終始孝道不敢以解倦者以為人子孫懼不克昌前烈負纍其先祖故也亡音無斷音短解佳賣反纍劣偽反天子章第二經五十三字子曰愛親者不敢惡於人謂內愛己親而外不惡於人也夫兼愛無遺是謂君心上以順教則萬民同風旦暮利之則從事勝任也惡烏路反夫音扶勝音升敬親者不敢慢於人謂內敬其親而外不慢於人所以為至德也其至德以和天下而長幼之節肅焉尊卑之序辨焉是故不遺老忘親則九族無怨爵授有德則大臣興誼祿與有勞則士死其制任官以能則民上功刑當其罪則治無詭帥士以民之所載則上下和舉治先民之所急則衆不亂常行斯道也故國有紀綱而民知所以終始之也所長丁丈反上與尚同帥律反舉治直吏反愛敬盡於事親然後德教加於百姓刑於四海刑法也百姓被其德四海法其教故身者正德之本也治者耳目之詔也立身而民化德正而官辦安危在本治亂在身故孝者至德要道也有其人則通無其人則塞也治亂直吏反塞先北反蓋天子之孝也蓋者稱辜較之辭也又陳其大綱則綱目必舉天子之孝道不出此域也較古嶽反呂刑云一人有慶兆民賴之呂刑尚書篇名也呂者國名四嶽之後也為諸侯相穆王訓夏之贖刑以告四方一人謂天子也慶善也十億為兆言天子有善德兆民賴其福也夫明王設位法象天地是以天子稟命於天而布德於諸侯諸侯受命而宣於卿大夫卿大夫承教而告於百姓故諸侯有善讓功天子卿大夫有善推美諸侯士庶人有善歸之卿大夫子弟有善移之父兄由于上之德化也夫相息亮反夏户雅反贖神蜀反音扶推吐雷反諸侯章第三經七十六字子曰居上不驕高而不危高者必以下為基故居上位不驕莫不好利而惡害其能與百姓同利者則萬民持之是以雖處高猶不危也好呼報反惡烏路反處昌吕反制節謹度滿而不溢有制有節謹其法度是守足之道也其知守其足則雖滿而不盈溢矣高而不危所以長守貴也滿而不溢所以長守富也皆自然也先王疾驕天道虧盈不驕不溢用能長守富貴也是故自高者必有下之自多者必有損之故古之聖賢不上其高以求下人不溢其滿以謙受人所以自終也下人遐嫁反富貴不離其身然後能保其社稷而和其民人蓋諸侯之孝也有其德斯其爵矣有其爵斯其社稷矣居身於德處尊於爵據有社稷行其政令則人民和輯四境以寧諸侯之孝道其法如此也離力智反處昌吕反輯音集詩云戰戰兢兢如臨深淵如履薄冰詩小雅小旻之章自危懼之詩也行孝亦然故取喻焉臨深淵恐墜履薄冰恐陷言常不敢自康也夫能自危者則能安其位者也憂其亡者則能保其存者也懼其亂者則能有其治者也故君子安而不忘危存而不忘亡治而不忘亂是以身安而國家可保也同兢居陵反治直吏反下卿大夫章第四經九十四字子曰非先王之法服不敢服服者身之表也尊卑貴賤各有等差故賤服貴服謂之僭上僭上為不忠貴服賤服謂之逼下逼下為失位是以君子動不違法舉不越制所以成其德也差初佳反又初宜反逼彼力反非先王之法言不敢道法言謂孝弟忠信仁誼禮典也此八者不易之言也非此則不説也故能參德於天地公平無私賢不肖莫不用是先王之所以合于道也弟大計反非先王之德行不敢行修德於身行之於人擬而後言議而後動擬議以其志勤以行其典誼中能應外施必先當是以上安而下化之也德行下孟反當丁浪反是故非法不言非道不行必合典法然後乃言必合道誼然後乃行也無定之士明王不禮無度之言明王不許也尤所宜慎故申覆之法服有制是以不重也覆芳伏反重直用反口亡擇言身亡擇行言所可言行所可行故言行皆善無可棄擇者焉若夫偷得利而後有害偷得樂而後有憂則先王所不言所不行也行亡音無下皆同行下孟反傳言同夫音扶樂音洛言滿天下亡口過行滿天下亡怨惡聖人詳慎與世超絶發言必顧其纍將行必慮其難故出言而天下説之所行而天下樂之言不逆民行不悖事則人恐其不復言恐其不復行若言之不可復者其事不信也行之不可再者其行暴賊也言而不信則民不附行而暴賊則天下怨民不附天下怨此皆滅亡所從生也行下孟反傳行不行之其行皆同惡烏路反纍劣偽反難乃旦反説音悅樂音洛悖補對反復扶又反下同三者備矣然後能保其祿位而守其宗廟蓋卿大夫之孝也三者謂服應法言有則行合適也立身之本在此三者三者無闕則可以安其位食其祿祭祀祖考護守宗廟宗者尊也廟者貌也父母既沒宅兆其靈於之祭祀謂之尊貌此卿大夫之所以為孝也行下孟反詩云夙夜匪解以事一人詩大雅蒸民美仲山甫之章也仲山甫為周宣王之卿大夫以事天子得其道故取成誼焉言其柔嘉維則令儀令色小心翼翼古訓是式威儀是力既明且哲以保其身皆與此誼同也反解佳賣士章第五經八十六字子曰資於事父以事母其愛同資取也取事父之道以事母其愛同也資於事父以事君其敬同言愛父與母同敬君與父同也故母取其愛而君取其敬兼之者父也母至親而不尊君至尊而不親唯父兼尊親之誼焉夫至親者則敬不至至尊者則愛不至人常情也是故為人父者不明父子之誼以教其子則子不知為子之道以事其父為人君者不明君臣之誼以正其臣則臣不知為臣之理以事其主君臣以誼固上下以序和衆庶以愛輯則主有令而民行之上有禁而民不犯也夫音扶輯音集故以孝事君則忠孝者子婦之高行也忠者臣下之高行也父母教而得理則子婦孝子婦孝則親之所安也能盡孝以順親則當於親當於親則美名彰人君寬而不虐則臣下忠臣下忠則君之所用也能盡忠以事上則當於君當於君則爵祿至是故執人臣之節以事親其孝可知也操事親之道以事君其忠必矣行下孟反下同操七刀反以弟事長則順弟者善事兄之謂也順生於弟故觀其所以事兄則知其所以事長也弟大計反傳同長丁丈反傳同忠順不失以事其上然後能保其爵祿而守其祭祀蓋士之孝也上謂君長也此撮凡舉要申解為士之誼所以能保其爵祿而守其祭祀者則以其不失忠順於君長故也長丁丈反下同詩云夙興夜寐亡忝爾所生詩小雅小宛之章也言日月流邁嵗不我與當夙起夜寐進德修業以無忝辱其父母也能揚名顯父母保位守祭祀非以孝弟莫由至焉也亡音無宛於阮反弟大計反庶人章第六經二十四字子曰因天之時就地之利天時謂春生夏長秋收冬藏也地利謂原隰水陸各有所宜也庶人之業稼穡為務審因四時就於地宜除田擊稿深耕疾耰時雨既至播殖百榖挾其槍刈修其壟畝脫衣就功暴其髮膚旦暮從事霑體塗足少而習焉其心休焉是故其父兄之教不肅而成其子弟之學不勞而能也反長丁丈反稿古老反耰於求反槍七羊刈魚廢反暴步木反少詩照反謹身節用以養父母此庶人之孝也謹身者不敢犯非也節用者約而不奢也不為非則無患不為奢則用足身無患悔而財用給足以恭事其親此庶人之所以為孝也養羊尚反孝平章第七經二十五字子曰故自天子以下至於庶人故者故上陳孝五章之誼也孝亡終始而患不及者未之有也躬行孝道尊卑一揆人子之道所以為常也必有終始然後乃善其不能終始者必及患禍矣故為君而惠為父而慈為臣而忠為子而順此四者人之大節也大節在身雖有小過不為不孝為君而虐為父而暴為臣而不忠為子而不順此四者人之大失也大失在身雖有小善不得為孝上章既品其為孝之道此又總説其無終始之咎以勉人為高行也行下孟反三才章第八經一百二十九字曽子曰甚哉孝之大也曽子聞孝為德本而化所由生自天子達庶人焉行者遇福不用者蒙患然後乃知孝之為甚大也子曰夫孝天之經也地之誼也民之行也經常也誼宜也行所由也亦皆謂常也夫天有常節地有常宜人有常行一設而不變此謂三常也孝其本也兼而統之則人君之道也分而殊之則人臣之事也君失其道無以有其國臣失其道無以有其位故上之畜下不妄下之事上不虛孝之致也夫音扶傳同行下孟反傳同畜許六反天地之經而民是則之是是此誼也則法也治安百姓人君之則也訓護家事父母之則也諫爭死節臣下之則也盡力善養子婦之則也人君不易其則故百姓説焉父母不易其則故家事修焉臣下不易其則故主無愆焉子婦不易其則故親養具焉斯皆法天地之常道也是故用則者安不用則者危也爭音諍養羊尚反下同説音悅愆與愆同起虔反則天之明因地之利以訓天下夫覆而無外者天也其德無不在焉載而無棄者地也其物莫不殖焉是以聖人法之以覆載萬民萬民得職而莫不樂用故天地不為一物枉其時日月不為一物晦其明明王不為一人枉其法法天合德象地無缺取日月之無私則兆民賴其福也為夫音扶覆扶又反下同樂五教反于偽反下同是以其教不肅而成其政不嚴而治以其修則且有因也登山而呼音達五十里因高之響也造父執御千里不疲因馬之勢也聖人因天地以設法循民心以立化故不加威肅而教自成不加嚴刑而政自治也治直吏反傳同呼火故反造七報反父音甫先王見教之可以化民也識見教化終始之歸故設之焉是故先之以博愛而民莫遺其親博愛泛愛衆也先垂博愛之教以示親親也故民化之而無有遺忘其親者也陳之以德誼而民興行陳布也布德誼以化天下故民起而行德誼也先之以敬讓而民不爭上為敬則下不慢上好讓則下不爭上之化下猶風之靡草故每輒以已率先之也好呼報反率所律反道之以禮樂而民和睦禮以強教之樂以説安之君有父母之恩民有子弟之敬於是乎道之斯行綏之斯來動之斯和感之斯睦也悅道音導傳同強其丈反説音綏音雖示之以好惡而民知禁好謂賞也惡謂罰也賞罰明而不可欺法禁行而不可犯分職察而不可亂人君所以令行而禁止也令行禁止者必先令於民之所好而禁於民之所惡然後詳其鈇鉞慎其祿賞焉有不聽而可以得存者是號令不足以使下也有犯禁而可以得免者是鈇鉞不足以威衆也有無功而可以得富者是祿賞不足以勸民也號令不足以使下鈇鉞不足以威衆祿賞不足以勸民則人君無以自守之也好呼報反傳同惡烏路反傳同分扶問反鈇方于反鉞音越詩云赫赫師尹民具爾瞻詩小雅節南山之章也赫赫顯盛也師大師尹氏周之三公也具皆也爾女也言居顯盛之位衆民皆瞻仰之所行不可以違天地之經也善惡則民從故有位者慎焉音赫火百反節音截大音泰女汝孝治章第九經一百四十四字子曰昔者明王之以孝治天下也所謂明者照臨羣下必得其情也故下得道上賤得道貴卑者不待尊寵而亢大臣不因左右而進百官修道各奉其職有罰者主亢其罪有賞者主知其功亢知不悖賞罰不差有不蔽道故曰明所謂孝者至德要道也治亦訓也若乃涖官不忠非孝也不愛萬物非孝也接下不惠非孝也事上不敬非孝也亢苦浪反下同涖音利一音類不敢遺小國之臣而況於公侯伯子男乎小國之臣臣之卑者也公侯伯子男凡五等皆國君之尊爵也卑猶不敢遺忘尊者見敬可知也故得萬國之歡心以事其先王萬國者舉盈數也明王崇愛敬以接下則下竭歡心而應之是故損上益下民説無疆自上下下其道大光事之者謂四時享祀駿奔走在廟也説音悅疆居良反下下上遐嫁反治國者不敢侮於鰥寡而況於士民乎鰥寡之人人之尤疲弱者猶且不侮慢之況於士民乎故得百姓之歡心以事其先君説天子言先王道諸侯言先君皆明其祖考也凡民愛之則親利之則至是以明君之政設利以致之明愛以親之若徒利而不愛則衆不親徒愛而不利則衆不至愛利俱行衆乃説也乃説音悅治家者不敢失於臣妾之心而況於妻子乎卿大夫稱家臣之與妾賤人也妻之與子貴者也接賤不失禮則其敬貴必矣故得人之歡心以事其親人謂采邑之人也愛利不失得其歡心所以供事其親不言先者大夫以賢舉包父祖之見在也反采七代反見賢遍夫然故生則親安之祭則鬼享之夫然猶言如是生盡孝養故親安之祭致齊敬故鬼饗之謂其祖考也夫音扶傳同養羊尚反齊側皆反是以天下和平災害不生禍亂不作上下行孝愛敬交通天下和平人和神説故妖孽不生禍亂不起也説音悅孽魚列反故明王之以孝治天下也如此如此福應也行善則休徵報之行惡則咎徵隨之皆行之致也此有諸侯及卿大夫之事而主於明王者下之能孝化於上也皆行下孟反詩云有覺德行四國順之詩大雅抑之章也覺直也言先王行正直之德則四方之衆國皆順從法則之也行下孟反聖治章第十經一百四十一字曽子曰敢問聖人之德亡以加於孝乎曽子聞明王以孝道化天下如上章之詳故知聖人建德無以尚於孝矣亡音無子曰天地之性人為貴人之行莫大於孝性生也言凡生天地之間含氣之類人最其貴者也正君臣上下之誼篤父子兄弟夫妻之道辨男女內外疏數之節章明福慶示以廉恥所以為貴也孝者德之本教之所由生也故人之行莫大於孝焉色行下孟反傳同數角反孝莫大於嚴父嚴父莫大於配天則周公其人也嚴尊也言為孝之道無大於尊嚴其父以配祭天帝者周公親行此莫大之誼故曰則其人也昔者周公郊祀后稷以配天凡禘郊祖宗皆祭祀之别名也天子祭天周公攝政制之祀典也於祭天之時后稷佑坐而配食之也禘大計反宗祀文王於明堂以配上帝上言郊祀此言宗祀取名雖殊其誼一也明堂禮誼之堂即周公相成王所以朝諸侯者也上帝亦天也文王於明堂后稷於圜丘也相息亮反朝直遙反圜音員是以四海之內各以其職來助祭夫聖人之德又何以加於孝乎人主以孝道化民則民一心而奉其上萬姓之事固非用威烈以忠愛也周公秉人君之權操必化之道以治必用之民處人主之勢以御必服之臣是以教行而下順海內公侯奉其職貢咸來助祭聖孝之極也復何以加之孝乎處夫音扶秉音丙操七刀反昌呂反復扶又反是故親生育之以養父母日嚴育之者父母也故其敬父母之心生於育之恩是以愛養其父母而致尊嚴焉育古育字養羊尚反傳同日人質反聖人因嚴以教敬因親以教愛言其不失於人情也其因有尊嚴父母之心而教以愛敬所以愛敬之道成因本有自然之心也聖人之教不肅而成其政不嚴而治其所因者本也凡聖人設教皆緣人之本性而道達之也故不加威肅而教成不加嚴刑而政治以其皆因人之本性故也治直吏反傳同道音導父母生績章第十一經三十字子曰父子之道天性也言父慈而教子愛而針愛敬之情出於中心乃其天性非因篤也君臣之誼也親愛相加則為父子之恩尊嚴之則有君臣之誼焉此又所以為兼之事也父母生之績莫大焉君親臨之厚莫重焉績功也父母之生子撫之育之顧之復之攻苦之功莫大焉者也有君親之愛臨長其子恩情之厚莫重焉者也凡上之所施於下者厚則下之報上亦厚厚薄之報各從其所施薄施而厚饋雖君不能得之於臣雖父不能得之於子民之從於厚猶飢之求食寒之欲衣厚則歸之薄則去之有由然也長丁丈反饋其位反孝優劣章第十二經一百二十字子曰不愛其親而愛他人者謂之悖德不敬其親而敬他人者謂之悖禮盡愛敬之道以事其親然後施之於人孝之本也違是道則悖亂德禮也下悖補對反及傳皆同以訓則昏民亡則焉夫德禮不易靡人不懷德禮之悖人莫之歸故以訓民則昏亂昏亂之教則民無所取法也亡音無夫音扶不宅於善而皆在於凶德宅居也孝弟敬順為善德昏亂無法為凶德不愛其親非孝弟也不敬其親非敬順也故曰不居於善皆在於凶德也弟大計反下同雖得志君子弗從也得志謂居位行德也不誼而富貴於我如浮雲無潤澤於萬物故君子弗從以言邦無善政不昧食其祿也君子則不然既不為悖德悖禮之事又不為苟求富貴也言思可道行思可樂言則思忠行則思敬不虛言行也思可道之言然後乃言言必信也思可行之事然後乃行行必果也合乎先王之法言故可道合乎先王之德行故可行也皆行下孟反傳行則言行行必德行同樂音洛德誼可尊作事可法立德行誼不違道正故可尊也制作事業動得物宜故可法也容止可觀進退可度容止威儀也進退動靜也正其衣冠尊其瞻視俯仰曲折必合規矩則可觀矣詳其舉止審其動靜進退周旋不越禮法則可度矣度者其禮法也以臨其民是以其民畏而愛之則而象之以者以君子言行德誼進退之事也整齊嚴栗則民畏之溫良寬厚則民愛之畏之則用愛之則親民親而用則君道成矣君有君之威儀則臣下則而象之故其在位可畏施舍可愛進退可度周旋可則容止可觀作事可法德誼可象聲氣可樂動作有文言語有章以臨其民謂之有威儀也行下孟反樂音洛故能成其德教而行其政令上正身以率下下順上而不違故德教成而政令行也教成政行君能有其國家令聞長世臣能守其官識保族供祀順是以下皆若是是以上下能相固也聞音問詩云淑人君子其儀不忒國風曹詩尸鳩之章也言善人君子之於威儀無差忒所以明用上誼也忒他得反紀孝行章第十三經九十三字子曰孝子之事親也條説所以事親之誼也居則致其敬養則致其樂謂虔恭朝夕盡其歡愛和顔説色致養父母孝敬之節也養羊尚反傳同樂音洛説音悅疾則致其憂喪則致其哀祭則致其嚴父母有疾憂心慘悴卜禱嘗藥食從病者衣冠不解行不正履所謂致其憂也親既終沒思慕號咷斬衰啜粥卜兆祖葬所謂致其哀也既葬後反虞祔練祥之祭及四時吉祀盡其齊敬之心人竭其尊肅之敬所謂致其嚴也慘干感反悴在醉反號户刀反咷道刀反衰七雷反啜川悅反祔音附齊側皆反五者備矣然後能事其親五者奉生之道三事死之道二備此五者之誼乃可謂能事其親也事親者居上不驕為下不亂在醜不爭上上位也醜羣類也不驕善接下也不亂奉上命也不爭務和順也居上而驕則亡為下而亂則刑在醜而爭則兵驕而無禮所以亡也亂而不恭所以刑也爭而不讓所以兵也謂兵刃見及也此三者不除雖日用三牲之養繇為不孝也三者謂驕亂爭也不除言在身也三牲牛羊豕也繇固也三者在身死亡將至既自受禍父母蒙患雖日用三牲供養固為不孝也養羊尚反傳同繇音由五刑章第十四經三十七字子曰五刑之屬三千五刑謂墨劓剕宫大辟也其三千條墨辟之屬千刻其顙墨之也劓辟之屬千截其鼻也剕辟之屬五百斷其足也宫辟之屬三百割其勢也大辟之屬二百死刑也凡五刑之屬三千也下劓魚器反剕扶味反辟婢亦反同顙息朗反斷音短而罪莫大於不孝言不孝之罪大於三千之刑也罪者謂居上而驕為下而亂在醜而爭之比也罪古罪字要君者亡上非聖人者亡法非孝者亡親要謂約勒也君者所以稟命也而要之此有無上之心者也聖人制法所以為治也而非之此有無法之心者也孝者親之至也而非之此有無親之心者也三者皆不孝之甚也得要於遙反傳同亡音無下同勒郎反治直吏反此大亂之道也此無上無法無親也言其不恥不仁不畏不誼為大亂之本不可不絶也凡為國者利莫大於治害莫大於亂亂之所生生於不祥上不愛下下不供上則不祥也羣臣不用禮誼則不祥也有司離法而專違制則不祥也故法者至道也聖君之所以為天下儀存亡治亂之所出也君臣上下皆發焉是以明王置儀設法而固守之卿相不得存其私羣臣不得便其親百官之事案以法則姦不生暴慢之人繩以法則禍亂不起夫能生法者明君也能守法者忠臣也能從法者良民也扶治直吏反下同離力智反相息亮反夫音廣要道章第十五經八十一字子曰教民親愛莫善於孝孝者愛其親以及人之親孝行著而愛人之心存焉故欲民之相親愛則無善於先教之以孝也行下孟反教民禮順莫善於弟弟者敬其兄以及人之長能弟者則能敬順於人者也故欲民之以禮相順則無善於先教之以弟也弟大計反傳同長丁丈反移風易俗莫善於樂風化也俗常也移太平之化易衰弊之常也樂五聲之主蕩滌人之心使和易専一由中情出者也故其聞之者雖不識音猶屏息靜聽深思逺慮其知音則循宫商而變節隨角徵以改操是以古之教民莫不以樂以皆為無尚之故也蕩唐黨反滌徒厯反和易以䜴反屏必領反徵張里反安上治民莫善於禮言禮最其善孝弟之實用也國無禮則上下亂而貴賤爭賢者失所不肖者蒙幸是故明王之治崇等禮以顯之設爵級以休之班祿賜以勸之所以政成也弟大計反禮者敬而已矣禮主於敬敬出於孝弟是故禮經三百威儀三千皆殊事而合敬異流而同歸也反弟大計故敬其父則子説敬其兄則弟説敬其君則臣説此言先王以子弟臣道化天下而天下子弟臣説喜也教之以孝是敬其父教之以弟是敬其兄教之以臣是敬其君也反説音悅傳同以弟大計敬一人而千萬人説上説所以施敬之事此總而言也一人者各謂其父兄君千萬人者羣子弟及臣也説音悅所敬者寡而説者衆此之謂要道也寡謂一人也衆謂千萬人也以孝道化民此其要者矣所以説成敬一人之誼也説音悅廣至德章第十六經八十三字子曰君子之教以孝也非家至而日見之也此又所以申明上章之誼焉言君子之教民以孝非家至而日見語之也君子亦謂先王也夫蛟龍得水然後立其神聖人得民然後成其化也蛟語魚據反夫音扶音交教以孝所以敬天下之為人父者也所謂敬其父則子説也以孝道教即是敬天下之為人父者也説音悅教以弟所以敬天下之為人兄者也所謂敬其兄則弟説也以弟道教即是敬天下之為人兄者也弟大計反傳以弟同説音悅教以臣所以敬天下之為人君者也所謂敬其君則臣説也以臣道教即是敬天下之為人君者也古之帝王父事三老兄事五更君事皇尸所以示子弟臣人之道也及其養國老則天子袒而割牲執醬而饋之執爵而酳之盡忠敬於其所尊以大化天下焉皇君也事尸者謂祭之象者也尸即所祭之像故臣子致其尊嚴也三老者國之舊德賢俊而老所從問道誼故有三人焉五更者國之臣更習古事博物多識所從誥道訓故有五人焉説音悅更音庚下同袒音但饋其位反酳以仭反詩云愷悌君子民之父母詩大雅泂酌之章也愷樂悌易也言君子敬以居身樂易于人其貴老慈幼忠愛之心似民之父母故以此詩明之也愷苦亥反悌大計反泂音迥樂音洛下同易以豉反下同非至德其孰能訓民如此其大者乎孝之為德其至矣故非有孝德其誰能以孝教民如此其大者乎言敷德以化下下皆順而從之也應感章第十七經一百十三字子曰昔者明王事父孝故事天明事母孝故事地察孝謂立宗廟豐祭祀也王者父事天母事地能追孝其父母則事天地不失其道不失其道則天地之精爽明察矣長幼順故上下治謂克明厥德以親九族也長者於王父兄之列也幼者於王子弟之屬也能順其長幼之節則親疏有序而以之化天下上下不亂也長丁丈反傳同治直吏反屬章欲反天地明察鬼神章矣章著也天地既明察則鬼神之道不得不著也謂人神不擾各順其常禍災不生也故雖天子必有尊也言有父也必有先也言有兄也必有長也更申覆上誼也天子雖尊猶尊父事死如事生宗廟致敬是也長丁丈反覆芳伏反宗廟致敬不忘親也修身慎行恐辱先也説所以事父母之道也立廟設主以象其生存潔齊敬祀以追孝繼思修行揚名以顯明祖考皆孝敬之事也所以不敢不勉為之者恐辱其先祖故也皆行下孟反傳同齊側反宗廟致敬鬼神著矣上句言天地明察鬼神以章此句言宗廟致敬鬼神以著言上下各致敬以祀其先人則鬼神有所依歸不相干犯也言無凶癘也音癘厲孝弟之至通於神明光於四海亡所不暨光充也暨及也明主以孝治天下則癘鬼為之不神不神者不為患害也其精神徵應如此故曰通於神明又充塞于天地之間焉無所不及言普洽也先弟大計反亡音無暨其器反為于偽反塞北反洽户甲反詩云自西自東自南自北亡思不服詩大雅文王有聲之章也美武王孝德之至而四方皆來服從與光于四海無所不暨誼同故舉以明此誼也亡音無廣揚名章第十八經四十四字子曰君子事親孝故忠可移於君能孝於親則必能忠於君矣求忠臣必於孝子之門也事兄弟故順可移於長善事其兄則必能順於長矣忠出于孝順出於弟故可移事父兄之忠順以事於君長也弟大計反傳同長丁丈反傳同居家理故治可移於官能理於家者則其治用可移於官君子之於人內觀其事親所以知其事君內察其治家所以知其治官是以言治者必效之以其實譽人者必試之以其官故虛言不敢自進不肖不敢處官也治直吏反傳其治言治同譽音餘處昌吕反是以行成於內而名立於後世矣孝弟之行事父兄也而忠順出焉能理于其家閨門事也而治官出焉所謂行成於內而名立於後世也昔虞舜生於畎畝父頑母嚚弟又佷傲用能理率行孝道蒸蒸不怠天下推之萬姓詠之彌厯千載而聲聞不亡所謂揚名後世以顯父母也巾行下孟反傳之行行成同弟大計反畎工犬反嚚魚反佷與狠同胡懇反推吐雷反聞音問閨門章第十九經二十四字子曰閨門之內具禮矣乎上章陳孝道既詳故於此都目其為具禮矣夫禮經國家定社稷厚人民利後嗣者也君子修孝於閨門而事君事長以治官之誼備存焉夫音扶長丁丈反嚴親嚴兄所以言具禮之事也嚴親孝嚴兄弟也孝以事君弟以事長而忠順之節著矣弟大計反下同長丁丈反妻子臣妾繇百姓徒役也臣謂家臣傼也故家人有嚴君焉父之謂也父謂嚴君而兄為尊長則其妻子臣妾猶百姓徒役是故君子役私家之內而君人之禮具矣繇音由長丁丈反諫爭章第二十經一百四十八字曽子曰若夫慈愛龔敬安親揚名參聞命矣慈愛者所以接下也恭敬者所以事上也安親揚名者孝子之行也曽子稱名曰參既得聞此命也夫音扶龔與恭同參所金反下同行下孟反敢問子從父之命可謂孝乎疑思問也夫親愛禮順非違命之謂也以為於誼有闕是以問焉夫音扶子曰參是何言與是何言與言之不通邪再言之者非之深也可否相濟謂之和以水濟水謂之同和實生民同則不繼務在不違同也從是爭非和也曽子魯鈍不推致此誼故謂之不通也與音餘下同邪音耶爭音諍昔者天子有爭臣七人七人謂三公及前疑後丞左輔右弼也凡此七官主諫正天子之非也爭音諍章內及傳皆同雖亡道不失天下無道者不循先王之至德要道者不失天下言從諫也帝王之事一日萬幾萬幾有闕天子受之禍故立諫爭之官以匡已過過而能改善之大者也故凡諫所以安上猶食之肥體也主逆諫則國亡人呰食則體瘠也亡音無下亡道同呰音紫瘠在昔反諸侯有爭臣五人自上以下降殺以兩故五人五人謂天子所命之孤卿及國之三卿與大夫也殺所戒反雖亡道不失其國人非聖人不能無愆從諫如流斯不亡失也愆起虔反大夫有爭臣三人三人謂家相宗老側室也相息亮反雖亡道不失其家皆謂能受正諫善補過也天子王有四海故以天下為稱諸侯君臨百姓故以國為名大夫祿食采邑故以家為號凡此皆周之班制也反稱尺證反采七代士有爭友則身不離於令名同志為友士以道誼相切磋者故有非則忠告之以善道謂之爭友不離善名言常在身也離力智反傳同磋七何反告古毒反父有爭子則身不陷於不誼父有過則子必安幾諫見志而不從起敬起孝説顔説色則復諫也又不從則號泣而從之終不使父陷于不誼而已則孝子之道也幾音機説音悅下同復扶又反號户刀反故當不誼則子不可以不爭於父當值也值父有不誼之事子不可以不諫爭也臣不可以不爭於君事君之禮值其有非必犯嚴顔以道諫爭三諫不納奉身以退有匡正之忠無阿順之從良臣之節也若乃見可諫而不諫謂之尸位見可退而不退謂之懷寵懷寵尸位國之姦人也姦人在朝賢者不進苟國有患則優俺侏儒必起議國事矣是謂人主驅國而捐之也一三息暫反朝直遙反俺與閹同作奄驅起俱反故當不誼則爭之從父之命又安得為孝乎從命不得為孝則諫為孝矣故臣子之於君父值其不誼則必諫爭所以為忠孝者也重見當其不誼也夫臣能固爭至忠子能固諫至孝也人主忌忠謂之不君人父忌孝謂之不父忌忠孝則大亂之本也重直用反夫音扶事君章第二十一經四十九字子曰君子之事上也上謂君父此之謂君子以德稱也有君子之德而在下位固所以宜事君也進思盡忠退思補過進見於君則必竭其忠貞之節以圖國事直道正辭有犯無隱退還所職思其事宜獻可替否以補主過所以為忠君有過而臣不行謂之補過也見賢遍反將順其美匡救其惡將行也宜行其法令順之而不逆君有過臣舉言而匡之救其邪辟之行使不至於惡此臣之所以為功也故明王審言教以清法案分職以課功立功者賞亂政者誅誅賞之所加各得其宜也反辟匹亦反之行下孟分扶問反故上下能相親也道王以先王之行拯主於無過之地君臣並受其福上下交和所謂相親是故詳才量能講德而舉上之道下也盡忠守節謨明弼諧下之事上也為人君而下知臣事則有司不任為人臣而上專主行則上失其威是以有道之君務正德以涖下而下不言知能之術知能下所以供上也所以用知能者上之道也故不言知能而政治者善人舉官人得視聽者衆也夫人君坐萬物之源而官諸生之職者也上有其道下守其職上下之分定也道音導下道下同行下孟反下同拯拯救之拯涖音利又音類治直吏反夫音扶分扶問反詩云心乎愛矣遐不謂矣遐不謂矣言謂之也君子心誠愛其上則逺乎不以善事語之也語魚據反忠心臧之何日忘之君子忠心實善則何日豈忘謂其上乎言每欲語之也君子事上誼與詩同故取以明之此詩小雅隰桑之章也臧子郎反語魚據反喪親章第二十二經一百四十二字子曰孝子之喪親也父母沒斬衰居憂謂之喪親也衰七雷反後皆同哭不依禮亡容斬衰之哭其聲若往而不反無依違餘音也喪事質素無容儀所以主於哀也亡音無下同言不文發言不文飾其辭也斬衰之言唯而不對所以為不文也唯維癸反服美不安夫唯不安故不服也美謂錦繡盛服也先王制禮稱情立文凶服象其憂吉服象其樂各所以表飾中情也是以衰麻在身即有悲哀之色端冕在身即有矜莊之色介胄在身即有可畏之色也夫音扶稱尺證反樂音洛聞樂不樂食旨不甘旨亦美也其不樂故不聽不美故不食孝子思慕之至也不樂音洛傳同此哀戚之情也所以解上六句之誼明有內發非虛加也三日而食教民亡以死傷生也禮親終哭踊無數水漿不入口毁竈不舉火既斂之後鄰里為之饘粥以飲食之三日以終者聖人立制足文理不以死傷生也斂力驗反後同饘之然反粥之六反飲於鴆反食音嗣毁不滅性此聖人之正也孝子在喪可以毁瘠杖然後起而不可滅性滅性謂不勝喪而死不勝喪則此比於不孝此聖人之正制也瘠在昔反勝音升下同喪不過三年示民有終也孝子有終身之憂然三年之喪二十五月而畢服節雖闋心弗之忘若遂其本性則是無窮也故以禮取中制為三年使賢者俯就不肖者企及所以示民有竟之限也闋苦穴反企邱豉反為之棺椁衣衾以舉之禮為死制椁椁周於棺棺周於衣衣周於身衣即斂衣衾被也舉尸內之棺椁也內棺音官椁音郭為死于偽反音納陳其簠簋而哀戚之簠簋祭器盛黍稷者祭器陳列而不御黍稷潔盛而不毁孝子所以重增哀戚也簠音甫簋音軌盛音成下同重直龍反哭泣劈踊哀以送之卜其宅兆而安措之捶心曰劈跳曰踊所以泄哀也男踊女劈哀以送之送之送慕始死牖下浴於中霤飯於牖下斂於户內殯於客位祖奠於庭送葬於墓彌以即逺也卜其葬地定其宅兆兆謂塋域宅謂穴措置也安置棺椁於其穴卜葬地者孝子重慎恐其下有伏石漏水後為市朝逺防之也羊劈婢亦反捶與椎同一作槌跳徒雕反泄息列反牖九反霤力又反飯扶晚反殯必刃反塋音營朝直遙反為之宗廟以鬼亨之春秋祭祀以時思之三年喪畢立其宗廟用鬼禮享祀之也言春則有夏言秋則有冬舉春秋而四時之誼存矣春雨既濡君子履之必有怵惕之心感親而修祭焉所謂以時思之也亨許丈反通作享怵敕律反惕他厯反生事愛敬死事哀戚父母生則事之以愛敬死則事之以哀戚糾撮上章之要也糾居黝反撮七活反生民之本盡矣謂立身之道盡於孝經之誼也死生之誼備矣事死事生之誼備於是也孝子之事終矣言為孝子之道終竟於此篇也古文孝經孔氏傳
