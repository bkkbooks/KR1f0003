body:
  text: 古文孝經宋本仲尼閒居曽子侍坐子曰參先王有至德要道以順天下民用和睦上下無怨女知之乎曽子避席曰參不敏何足以知之子曰夫孝德之本教之所由生復坐吾語女身體髮膚受之父母不敢毁傷孝之始也立身行道揚名於後世以顯父母孝之終也夫孝始於事親中於事君終於立身大雅云無念爾祖聿修厥德子曰愛親者不敢惡於人敬親者不敢慢於人愛敬盡於事親而德教加於百姓刑于四海蓋天子之孝甫刑云一人有慶兆民賴之在上不驕高而不危制節謹度滿而不溢高而不危所以長守貴滿而不溢所以長守富富貴不離其身然後能保其社稷而和其民人蓋諸侯之孝詩云戰戰兢兢如臨深淵如履薄冰非先王之法服不敢服非先王之法言不敢道非先王之德行不敢行是故非法不言非道不行口無擇言身無擇行言滿天下無口過行滿天下無怨惡三者備矣然後能守其宗廟蓋卿大夫之孝也詩云夙夜匪懈以事一人資於事父以事母而愛同資於事父以事君而敬同故母取其愛而君取其敬兼之者父也故以孝事君則忠以敬事長則順忠順不失以事其上然後能保其爵祿而守其祭祀蓋士之孝也詩云夙興夜寐無忝爾所生子曰因天之道因地之利謹身節用以養父母此庶人之孝也故自天子已下至於庶人孝無終始而患不及者未之有也曽子曰甚哉孝之大也子曰夫孝天之經地之義民之行天地之經而民是則之因天之明因地之義以順天下是以其教不肅而成其政不嚴而治先王見教之可以化民也是故先之博愛而民莫遺其親陳之以德義而民興行先之敬讓而民不爭導之以禮樂而民和睦示之以好惡而民知禁詩云赫赫師尹民具爾瞻子曰昔者明王以孝治天下也不敢遺小國之臣而況於公侯伯子男乎故得萬國之歡心以事其先王治國者不敢侮於鰥寡而況於士民乎故得百姓之歡心以事其先君治家者不敢侮於臣妾而況於妻子乎故得人之歡心以事其親夫然故生則親安之祭則鬼享之是以天下和平災害不生禍亂不作故明王之以孝治天下如此詩云有覺德行四國順之曽子曰敢問聖人之德其無以加於孝乎子曰天地之性人為貴人之行莫大於孝孝莫大於嚴父嚴父莫大於配天則周公其人也昔者周公郊祀后稷以配天宗祀文王於明堂以配上帝是以四海之內各以其職來助祭夫聖人之德又何以加於孝乎故親生之膝下以養父母日嚴聖人因嚴以教敬因親以教愛聖人之教不肅而成其政不嚴而治其所因者本也子曰父子之道天性君臣之義父母生之續莫大焉君親臨之厚莫重焉子曰不愛其親而愛他人者謂之悖德不敬其親而敬他人者謂之悖禮以順則逆民無則焉不在於善而皆在於凶德雖得之君子所不貴君子則不然言斯可道行斯可樂德義可尊作事可法容止可觀進退可度以臨其民是以其民畏而愛之則而象之故能成其德教而行政令詩云淑人君子其儀不忒子曰孝子之事親居則致其敬養則致其樂病則致其憂喪則致其哀祭則致其嚴五者備矣然後能事親事親者居上不驕為下不亂在醜不爭居上而驕則亡為下而亂則刑在醜而爭則兵此三者不除雖日用三牲之養猶為不孝也子曰五刑之屬三千而罪莫大於不孝要君者無上非聖者無法非孝者無親此大亂之道也子曰教民親愛莫善於孝教民禮順莫善於弟移風易俗莫善於樂安上治民莫善於禮禮者敬而已矣故敬其父則子悅敬其兄則弟悅敬其君則臣悅敬一人而千萬人悅所敬者寡而悅者衆此之謂要道子曰君子之教以孝也非家至而日見之也教以孝所以敬天下之為人父者教以弟所以敬天下之為人兄者教以臣所以敬天下之為人君者詩云愷悌君子民之父母非至德其孰能順民如此其大者乎子曰昔者明王事父孝故事天明事母孝故事地察長幼順故上下治天地明察神明彰矣故雖天子必有尊也言有父也必有先也言有兄也宗廟致敬不忘親也修身慎行恐辱親也宗廟致敬鬼神著矣孝弟之至通於神明光於四海無所不通詩云自西自東自南自北無思不服子曰君子之事親孝故忠可移於君事兄弟故順可移於長居家理故治可移於官是故行成於內而名立於後世矣子曰閨門之內具禮矣乎嚴父嚴兄妻子臣妾猶百姓徒役也曽子曰若夫慈愛恭敬安親揚名參聞命矣敢問從父之令可謂孝乎子曰是何言與是何言與言之不通也昔者天子有爭臣七人雖無道不失其天下諸侯有爭臣五人雖無道不失其國大夫有爭臣三人雖無道不失其家士有爭友則身不離於令名父有爭子則身不陷於不義故當不義則子不可以弗爭於父臣不可以弗爭於君故當不義則爭之從父之令焉得為孝乎子曰君子事上進思盡忠退思補過將順其美匡救其惡故上下能相親詩云心乎愛矣遐不謂矣中心藏之何日忘之子曰孝子之喪親哭不偯禮無容言不文服美不安聞樂不樂食旨不甘此哀戚之情三日而食教民無以死傷生毁不滅性此聖人之政喪不過三年示民有終為之棺槨衣衾而舉之陳其簠簋而哀戚之劈踊哭泣哀以送之卜其宅兆而安措之為之宗廟以鬼享之春秋祭祀以時思之生事愛敬死事哀戚生民之本盡矣死生之義備矣孝子之事親終矣
